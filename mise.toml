[tools]
bun = "1.3.14"
node = "22.12.0"

[settings]
experimental = true
pin = true

[hooks]
postinstall = "bun install"

[env]
_.path = "node_modules/.bin"

[tasks.dev]
description = "Start Astro development server in background mode"
run = "astro dev --background"

[tasks.build]
description = "Build the project"
run = "bun run build"

[tasks.preview]
description = "Preview the production build"
run = "bun run preview"

[tasks.astro]
description = "Run the Astro CLI"
run = "bun run astro"

[tasks."validate:lexicons"]
description = "Validate lexicon files"
run = "bun run validate:lexicons"
